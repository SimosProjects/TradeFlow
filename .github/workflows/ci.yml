docker:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: TradeFlow.Worker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tradeflow-worker:latest
            ghcr.io/${{ github.repository_owner }}/tradeflow-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: TradeFlow.Api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tradeflow-api:latest
            ghcr.io/${{ github.repository_owner }}/tradeflow-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max