name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write        # needed by dorny/test-reporter
      pull-requests: write # needed by dorny/test-reporter

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB:       tradeflow_test
          POSTGRES_USER:     test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore TradeFlow.sln

      - name: Build
        run: dotnet build TradeFlow.sln
          --configuration Release
          --no-restore

      - name: Unit Tests
        run: dotnet test TradeFlow.Tests/TradeFlow.Tests.csproj
          --configuration Release
          --no-build
          --filter "FullyQualifiedName!~Integration"
          --logger "trx;LogFileName=unit-results.trx"

      - name: Integration Tests
        run: dotnet test TradeFlow.Tests/TradeFlow.Tests.csproj
          --configuration Release
          --no-build
          --filter "FullyQualifiedName~Integration"
          --logger "trx;LogFileName=integration-results.trx"
        env:
          XTRADES_TOKEN: dummy-token-for-ci

      - name: Publish Test Results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Test Results
          path: '**/*.trx'
          reporter: dotnet-trx