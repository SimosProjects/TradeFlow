name: Release

on:
  push:
    tags:
      - 'v*'  # triggers on any tag starting with v (v1.0.0, v2.1.3)

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -- Extract version from tag --
      - name: Get Version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        # GITHUB_REF = refs/tags/v1.2.3 → VERSION = 1.2.3

      # -- Build Docker images with version tag --
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Versioned Images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: TradeFlow.Worker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tradeflow-worker:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/tradeflow-worker:latest

      # -- Create GitHub Release --
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: TradeFlow v${{ steps.version.outputs.VERSION }}
          body: |
            ## TradeFlow v${{ steps.version.outputs.VERSION }}

            Docker images:
            - `ghcr.io/${{ github.repository_owner }}/tradeflow-worker:${{ steps.version.outputs.VERSION }}`
            - `ghcr.io/${{ github.repository_owner }}/tradeflow-api:${{ steps.version.outputs.VERSION }}`
          draft: false
          prerelease: false