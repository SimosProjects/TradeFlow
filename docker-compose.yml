services:

  # PostgreSQL
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB:       tradeflow
      POSTGRES_USER:     tradeflow_user
      POSTGRES_PASSWORD: tradeflow_dev
    volumes:
      # Named volume, data persists across container restarts
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Expose to host for psql/pgAdmin access during development
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradeflow_user -d tradeflow"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tradeflow-net

  # Worker Service
  worker:
    build:
      context: .
      dockerfile: TradeFlow.Worker/Dockerfile
    environment:
      # Connection string overrides appsettings.json
      ConnectionStrings__TradeFlow: >-
        Host=postgres;Database=tradeflow;
        Username=tradeflow_user;Password=tradeflow_dev
      # Token injected from host environment, never hardcoded
      XTRADES_TOKEN: ${XTRADES_TOKEN}
      DOTNET_ENVIRONMENT: Development
    depends_on:
      postgres:
        condition: service_healthy  # Wait for postgres healthcheck to pass
    networks:
      - tradeflow-net
    restart: unless-stopped

  # API
  api:
    build:
      context: .
      dockerfile: TradeFlow.Api/Dockerfile
    environment:
      ConnectionStrings__TradeFlow: >-
        Host=postgres;Database=tradeflow;
        Username=tradeflow_user;Password=tradeflow_dev
      DOTNET_ENVIRONMENT: Development
    ports:
      - "5141:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tradeflow-net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  tradeflow-net:
    driver: bridge